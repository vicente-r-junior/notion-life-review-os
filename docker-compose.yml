services:
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://app-redis:6379
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      app-redis:
        condition: service_healthy
    networks:
      - default
      - evolution-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  notion-mcp:
    image: mcp/notion
    command: ["--transport", "http", "--port", "3000"]
    environment:
      - NOTION_TOKEN=${NOTION_API_KEY}
      - AUTH_TOKEN=${MCP_AUTH_TOKEN}
    ports:
      - "127.0.0.1:3000:3000"
    restart: always

  app-redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  default:
    driver: bridge
  evolution-net:
    external: true
